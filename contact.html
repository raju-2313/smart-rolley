<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Smart Trolley</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <!-- model-viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>

    <style>
    /* ═══════════════════════════════════════════════════════
       ROBOT CONTACT ASSISTANT — page-scoped styles
       These do NOT affect any other page.
    ═══════════════════════════════════════════════════════ */

    /* ── Page scaffold ─────────────────────────────────── */
    .rc-page {
        min-height: calc(100vh - 180px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem 3rem;
    }

    /* ── Main card ─────────────────────────────────────── */
    .rc-card {
        width: min(560px, 100%);
        background: rgba(10, 18, 35, 0.78);
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 28px;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow:
            0 0 0 1px rgba(255,255,255,0.05) inset,
            0 1px 0   rgba(255,255,255,0.09) inset,
            0 20px 60px rgba(0,0,0,0.55),
            0 0 120px  rgba(0,198,255,0.06);
        position: relative;
        overflow: hidden;
        padding-bottom: 2rem;
    }

    /* top accent line */
    .rc-card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 1px;
        background: linear-gradient(
            90deg,
            transparent,
            rgba(0,198,255,0.55) 40%,
            rgba(124,77,255,0.45) 70%,
            transparent
        );
    }

    /* ── Robot stage ───────────────────────────────────── */
    .rc-robot-stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 1.8rem;
        position: relative;
    }

    /* glow ring behind model-viewer */
    .rc-robot-glow {
        position: absolute;
        top: 50px;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(0,198,255,0.18) 0%, transparent 70%);
        pointer-events: none;
        animation: rcGlowPulse 3s ease-in-out infinite;
    }

    @keyframes rcGlowPulse {
        0%,100% { transform: scale(1);   opacity: 0.7; }
        50%      { transform: scale(1.15); opacity: 1;   }
    }

    model-viewer.rc-robot {
        width: 200px;
        height: 200px;
        background: transparent;
        --poster-color: transparent;
        animation: rcFloat 4s ease-in-out infinite;
        position: relative;
        z-index: 1;
        filter: drop-shadow(0 0 18px rgba(0,198,255,0.35));
    }

    @keyframes rcFloat {
        0%,100% { transform: translateY(0px);   }
        50%      { transform: translateY(-10px); }
    }

    /* bounce-once on question change */
    .rc-robot.bounce {
        animation: rcFloat 4s ease-in-out infinite, rcBounce 0.4s ease;
    }
    @keyframes rcBounce {
        0%  { transform: scale(1);    }
        40% { transform: scale(1.08); }
        70% { transform: scale(0.96); }
        100%{ transform: scale(1);    }
    }

    /* ── Speech bubble ─────────────────────────────────── */
    .rc-bubble {
        position: relative;
        background: rgba(0,198,255,0.10);
        border: 1px solid rgba(0,198,255,0.30);
        border-radius: 18px;
        padding: 0.9rem 1.4rem;
        margin: 0 1.5rem;
        max-width: 420px;
        text-align: center;
        color: #e8f4ff;
        font-family: "Rajdhani", sans-serif;
        font-size: clamp(0.95rem, 2.5vw, 1.1rem);
        font-weight: 600;
        line-height: 1.5;
        letter-spacing: 0.01em;
        transition: opacity 0.3s ease, transform 0.3s ease;
    }

    /* tail pointing up toward robot */
    .rc-bubble::before {
        content: "";
        position: absolute;
        top: -9px;
        left: 50%;
        transform: translateX(-50%);
        border-left: 9px solid transparent;
        border-right: 9px solid transparent;
        border-bottom: 9px solid rgba(0,198,255,0.30);
    }

    .rc-bubble.fade-out {
        opacity: 0;
        transform: translateY(6px);
    }
    .rc-bubble.fade-in {
        opacity: 1;
        transform: translateY(0);
    }

    /* typing dots */
    .rc-typing {
        display: inline-flex;
        gap: 5px;
        align-items: center;
        height: 20px;
    }
    .rc-typing span {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: rgba(0,198,255,0.7);
        animation: rcDot 1.2s ease-in-out infinite;
    }
    .rc-typing span:nth-child(2){ animation-delay: 0.2s; }
    .rc-typing span:nth-child(3){ animation-delay: 0.4s; }
    @keyframes rcDot {
        0%,80%,100%{ transform: scale(0.6); opacity:0.5; }
        40%         { transform: scale(1.0); opacity:1;   }
    }

    /* ── Progress dots ─────────────────────────────────── */
    .rc-progress {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin: 1.2rem 0 0.8rem;
    }
    .rc-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: rgba(255,255,255,0.18);
        border: 1px solid rgba(255,255,255,0.25);
        transition: background 0.3s, box-shadow 0.3s;
    }
    .rc-dot.active {
        background: #00c6ff;
        box-shadow: 0 0 8px rgba(0,198,255,0.7);
    }
    .rc-dot.done {
        background: rgba(0,198,255,0.4);
    }

    /* ── Input panel ───────────────────────────────────── */
    .rc-input-panel {
        padding: 0 1.8rem;
        margin-top: 0.6rem;
        transition: opacity 0.3s ease;
    }

    .rc-input-row {
        display: flex;
        gap: 0.7rem;
        align-items: stretch;
    }

    .rc-input {
        flex: 1;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 14px;
        padding: 0.75rem 1.1rem;
        color: #e8f4ff;
        font-family: "Rajdhani", sans-serif;
        font-size: 1rem;
        font-weight: 500;
        outline: none;
        transition: border-color 0.25s, box-shadow 0.25s;
        resize: none;
    }
    .rc-input::placeholder { color: rgba(232,244,255,0.30); }
    .rc-input:focus {
        border-color: rgba(0,198,255,0.55);
        box-shadow: 0 0 0 3px rgba(0,198,255,0.10);
        background: rgba(255,255,255,0.09);
    }
    textarea.rc-input {
        min-height: 90px;
        line-height: 1.5;
    }

    .rc-next-btn {
        flex-shrink: 0;
        width: 50px;
        height: 50px;
        border-radius: 14px;
        border: none;
        background: linear-gradient(135deg, #00c6ff, #0f62fe);
        color: white;
        font-size: 1.3rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 18px rgba(0,198,255,0.35);
        transition: transform 0.2s, box-shadow 0.2s;
        align-self: flex-end;
    }
    .rc-next-btn:hover {
        transform: translateY(-2px) scale(1.05);
        box-shadow: 0 8px 24px rgba(0,198,255,0.5);
    }
    .rc-next-btn:active { transform: scale(0.96); }

    /* ── Send button (final step) ──────────────────────── */
    .rc-send-btn {
        width: 100%;
        margin-top: 0.8rem;
        padding: 0.95rem;
        border: none;
        border-radius: 16px;
        background: linear-gradient(135deg, #00c6ff 0%, #0f62fe 60%, #7c4dff 100%);
        color: white;
        font-family: "Orbitron", sans-serif;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        cursor: pointer;
        box-shadow: 0 8px 28px rgba(15,98,254,0.4);
        transition: transform 0.2s, box-shadow 0.2s;
        display: none;
        animation: popIn 0.35s ease;
    }
    .rc-send-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 36px rgba(15,98,254,0.55);
    }
    .rc-send-btn.visible { display: block; }

    /* ── Summary chips (shown at confirmation step) ────── */
    .rc-summary {
        display: none;
        flex-direction: column;
        gap: 0.5rem;
        margin: 0.8rem 0 0.5rem;
    }
    .rc-summary.visible { display: flex; }
    .rc-chip {
        display: flex;
        align-items: flex-start;
        gap: 0.6rem;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 12px;
        padding: 0.55rem 0.9rem;
    }
    .rc-chip-label {
        font-family: "Orbitron", sans-serif;
        font-size: 0.62rem;
        color: rgba(0,198,255,0.75);
        letter-spacing: 0.10em;
        flex-shrink: 0;
        padding-top: 1px;
        min-width: 60px;
    }
    .rc-chip-value {
        font-family: "Rajdhani", sans-serif;
        font-size: 0.92rem;
        color: #e8f4ff;
        line-height: 1.4;
        word-break: break-all;
    }

    @keyframes popIn {
        from { transform: scale(0.88); opacity: 0; }
        to   { transform: scale(1);    opacity: 1; }
    }

    /* ── Validation hint ───────────────────────────────── */
    .rc-hint {
        font-family: "Rajdhani", sans-serif;
        font-size: 0.82rem;
        color: rgba(255,90,90,0.85);
        margin-top: 0.45rem;
        min-height: 1.1rem;
        padding-left: 4px;
        transition: opacity 0.2s;
    }
    </style>
</head>

<body>

    <div class="header">
        <h1>🛒 Smart Trolley</h1>
        <p class="tagline">Scan • Shop • Checkout Seamlessly</p>
    </div>

    <div class="nav">
        <a href="index.html">Home</a>
        <a href="billing.html">Billing</a>
        <a href="contact.html" class="active">Contact Us</a>
        <a href="store-map.html">Store Map</a>
        <a href="admin-login.html">Admin</a>
        <a href="staff-login.html">Staff</a>
    </div>

    <!-- ══════════════════════════════════════════════════
         ROBOT CONTACT ASSISTANT
    ══════════════════════════════════════════════════════ -->
    <div class="rc-page">
        <div class="rc-card">

            <!-- ── Robot + glow ── -->
            <div class="rc-robot-stage">
                <div class="rc-robot-glow"></div>
                <model-viewer
                    id="rcRobot"
                    class="rc-robot"
                    src="models/robot.glb"
                    alt="Smart Trolley Robot Assistant"
                    auto-rotate
                    camera-controls
                    disable-zoom
                    rotation-per-second="0deg"
                    interaction-prompt="none"
                    ar-status="not-presenting">
                </model-viewer>
            </div>

            <!-- ── Progress dots ── -->
            <div class="rc-progress" id="rcProgress">
                <div class="rc-dot active" id="dot0"></div>
                <div class="rc-dot"        id="dot1"></div>
                <div class="rc-dot"        id="dot2"></div>
                <div class="rc-dot"        id="dot3"></div>
            </div>

            <!-- ── Speech bubble ── -->
            <div class="rc-bubble fade-in" id="rcBubble">
                <div class="rc-typing" id="rcTyping">
                    <span></span><span></span><span></span>
                </div>
                <span id="rcBubbleText" style="display:none;"></span>
            </div>

            <!-- ── Input panel ── -->
            <div class="rc-input-panel" id="rcInputPanel">

                <!-- steps 0-2: single input/textarea -->
                <div id="rcInputRow" class="rc-input-row" style="display:none; margin-top:0.8rem;">
                    <input
                        id="rcTextInput"
                        class="rc-input"
                        type="text"
                        placeholder=""
                        autocomplete="off"
                    />
                    <button class="rc-next-btn" id="rcNextBtn" title="Next">&#8594;</button>
                </div>

                <!-- step 2: textarea version (swapped in by JS) -->
                <div id="rcTextareaRow" class="rc-input-row" style="display:none; margin-top:0.8rem;">
                    <textarea
                        id="rcTextareaInput"
                        class="rc-input"
                        placeholder=""
                    ></textarea>
                    <button class="rc-next-btn" id="rcNextBtn2" title="Next">&#8594;</button>
                </div>

                <div class="rc-hint" id="rcHint"></div>

                <!-- step 3: confirmation summary -->
                <div class="rc-summary" id="rcSummary">
                    <div class="rc-chip">
                        <span class="rc-chip-label">NAME</span>
                        <span class="rc-chip-value" id="sumName"></span>
                    </div>
                    <div class="rc-chip">
                        <span class="rc-chip-label">EMAIL</span>
                        <span class="rc-chip-value" id="sumEmail"></span>
                    </div>
                    <div class="rc-chip">
                        <span class="rc-chip-label">MESSAGE</span>
                        <span class="rc-chip-value" id="sumMsg"></span>
                    </div>
                </div>

            </div><!-- /rc-input-panel -->

            <!-- ══ REAL FORM — values piped here by JS ══
                 form-name hidden input kept for Netlify.
                 All input names are unchanged.            -->
            <form
                id="rcRealForm"
                name="contact"
                method="POST"
                action="/contact.html"
                data-netlify="true"
                style="position: absolute;left: -9999px;"

            >
                <input type="hidden" name="form-name" value="contact" />
                <input type="text"  id="realName"    name="name"    />
                <input type="email" id="realEmail"   name="email"   />
                <textarea           id="realMessage" name="message"></textarea>
            </form>

            <!-- Send button (revealed at step 3) -->
            <div style="padding: 0 1.8rem;">
                <button
                    type="button"
                    id="rcSendBtn"
                    class="rc-send-btn"
                    onclick="rcSubmit()"
                >
                    🚀 &nbsp;SEND MESSAGE
                </button>
            </div>

        </div><!-- /rc-card -->
    </div><!-- /rc-page -->

    <!-- ── Google Translate (unchanged) ── -->
    <div id="google_translate_element" style="display:none;"></div>
    <script>
    function googleTranslateElementInit() {
        new google.translate.TranslateElement(
            {pageLanguage: 'en', autoDisplay: false},
            'google_translate_element'
        );
    }
    </script>
    <script>
        setInterval(function() {
            const banner = document.querySelector(".goog-te-banner-frame");
            if (banner) banner.style.display = "none";
            document.body.style.top = "0px";
        }, 500);
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script src="js/app.js"></script>

    <!-- ══════════════════════════════════════════════════
         ROBOT ASSISTANT FLOW SCRIPT
    ══════════════════════════════════════════════════════ -->
    <script>
    (function () {

        /* ── Step definitions ─────────────────────────── */
        const STEPS = [
            {
                msg:         "Hi! I'm the Smart Trolley assistant 🤖\nI'll help you send a message to our team.",
                placeholder: "Type your name…",
                type:        "text",
                inputType:   "text",
                validate:    v => v.trim().length >= 2 ? "" : "Please enter at least 2 characters."
            },
            {
                msg:         "Nice to meet you! 👋\nWhat's your email address?",
                placeholder: "you@example.com",
                type:        "text",
                inputType:   "email",
                validate:    v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()) ? "" : "Please enter a valid email."
            },
            {
                msg:         "Got it! 📝\nWhat would you like to tell us?",
                placeholder: "Type your message here…",
                type:        "textarea",
                validate:    v => v.trim().length >= 10 ? "" : "Please enter at least 10 characters."
            },
            {
                msg:         "Perfect! ✅\nHere's a summary — ready to send?",
                placeholder: "",
                type:        "confirm"
            }
        ];

        let step       = 0;
        const answers  = ["","",""];

        /* ── DOM refs ─────────────────────────────────── */
        const robot       = document.getElementById("rcRobot");
        const bubble      = document.getElementById("rcBubble");
        const bubbleText  = document.getElementById("rcBubbleText");
        const typing      = document.getElementById("rcTyping");
        const inputRow    = document.getElementById("rcInputRow");
        const textareaRow = document.getElementById("rcTextareaRow");
        const textInput   = document.getElementById("rcTextInput");
        const taInput     = document.getElementById("rcTextareaInput");
        const hint        = document.getElementById("rcHint");
        const summary     = document.getElementById("rcSummary");
        const sendBtn     = document.getElementById("rcSendBtn");
        const dots        = [0,1,2,3].map(i => document.getElementById("dot"+i));

        const nextBtn     = document.getElementById("rcNextBtn");
        const nextBtn2    = document.getElementById("rcNextBtn2");

        /* ── Helpers ──────────────────────────────────── */
        function updateDots(active) {
            dots.forEach((d,i) => {
                d.classList.remove("active","done");
                if (i < active) d.classList.add("done");
                if (i === active) d.classList.add("active");
            });
        }

        function bounceRobot() {
            robot.classList.remove("bounce");
            void robot.offsetWidth; // reflow
            robot.classList.add("bounce");
        }

        function showMessage(msg, cb) {
            // fade out
            bubble.classList.add("fade-out");
            bubble.classList.remove("fade-in");

            setTimeout(() => {
                // show typing dots
                bubbleText.style.display = "none";
                typing.style.display     = "inline-flex";
                bubble.classList.remove("fade-out");
                bubble.classList.add("fade-in");

                // after typing delay, show real text
                setTimeout(() => {
                    typing.style.display    = "none";
                    bubbleText.style.display = "";
                    bubbleText.textContent   = "";

                    // type-writer char-by-char
                    let i = 0;
                    const interval = setInterval(() => {
                        if (i < msg.length) {
                            bubbleText.textContent += msg[i++];
                        } else {
                            clearInterval(interval);
                            if (cb) cb();
                        }
                    }, 22);
                }, 900);
            }, 280);
        }

        function showInputForStep(s) {
            const def = STEPS[s];

            // hide all inputs first
            inputRow.style.display    = "none";
            textareaRow.style.display = "none";
            summary.classList.remove("visible");
            sendBtn.classList.remove("visible");
            hint.textContent = "";

            if (def.type === "text") {
                textInput.type        = def.inputType || "text";
                textInput.placeholder = def.placeholder;
                textInput.value       = "";
                inputRow.style.display = "flex";
                setTimeout(() => textInput.focus(), 600);
            } else if (def.type === "textarea") {
                taInput.placeholder    = def.placeholder;
                taInput.value          = "";
                textareaRow.style.display = "flex";
                setTimeout(() => taInput.focus(), 600);
            } else if (def.type === "confirm") {
                // show summary
                document.getElementById("sumName").textContent  = answers[0];
                document.getElementById("sumEmail").textContent = answers[1];
                document.getElementById("sumMsg").textContent   = answers[2];
                summary.classList.add("visible");
                sendBtn.classList.add("visible");
            }
        }

        function goToStep(s) {
            step = s;
            updateDots(s);
            bounceRobot();

            let message = STEPS[s].msg;


            if (s === 1 && answers[0]) {
                message = `Nice to meet you, ${answers[0]}! 👋
        What's your email address?`;
            }

            showMessage(message, () => showInputForStep(s));
        }

        function advance(rawValue) {
            const def = STEPS[step];
            const val = rawValue.trim();
            const err = def.validate ? def.validate(val) : "";
            if (err) {
                hint.textContent = err;
                return;
            }
            hint.textContent = "";
            answers[step] = val;
            goToStep(step + 1);
        }

        /* ── Event listeners ──────────────────────────── */
        nextBtn.addEventListener("click", () => advance(textInput.value));
        nextBtn2.addEventListener("click", () => advance(taInput.value));

        textInput.addEventListener("keydown", e => {
            if (e.key === "Enter") { e.preventDefault(); advance(textInput.value); }
        });
        taInput.addEventListener("keydown", e => {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); advance(taInput.value); }
        });

        /* ── Submit ───────────────────────────────────── */
        window.rcSubmit = async function () {
            const body = new URLSearchParams({
                "form-name": "contact",
                "name":      answers[0],
                "email":     answers[1],
                "message":   answers[2]
            });

            try {
                const res = await fetch("/", {
                    method:  "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body:    body.toString()
                });

                if (res.ok) {
                    // Show a success message to the user
                    document.getElementById("rcBubbleText").textContent =
                        "✅ Message sent! We'll get back to you soon.";
                    document.getElementById("rcSendBtn").style.display = "none";
                } else {
                    alert("Submission failed. Please try again.");
                }
            } catch (err) {
                alert("Network error. Please check your connection.");
            }
        };
        /* ── Boot ─────────────────────────────────────── */
        goToStep(0);

    })();
    </script>

</body>
</html>
