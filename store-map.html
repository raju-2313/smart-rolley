<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Trolley | Store Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
</head>

<body>

    <div class="header">
        <h1>🛒 Smart Trolley</h1>
        <p class="tagline">Find Products Easily</p>
    </div>

    <div class="nav">
        <a href="index.html">Home</a>
        <a href="billing.html">Billing</a>
        <a href="contact.html">Contact Us</a>
        <a href="store-map.html" class="active">Store Map</a>
        <a href="admin-login.html">Admin</a> 
        <a href="staff-login.html">Staff</a>   
    </div>

    <div class="map-container" style="margin-top: 32px;">
        <img id="storeMap" src="images/store.png" alt="Store Map">
    </div>

    <p class="map-info">
        Select a category to view its section.
    </p>

    <div class="category-list">
        <button onclick="changeMap('store')">Full Map</button>
        <button onclick="changeMap('groceries')">Groceries</button>
        <button onclick="changeMap('electronics')">Electronics</button>
        <button onclick="changeMap('dairy')">Dairy</button>
        <button onclick="changeMap('clothing')">Clothing</button>
    </div>

    <div id="google_translate_element" style="display:none;"></div>

    <script>
    function googleTranslateElementInit() {
    new google.translate.TranslateElement(
        {pageLanguage: 'en', autoDisplay: false},
        'google_translate_element'
    );
    }
    </script>

    <script>

        setInterval(function() {
            const banner = document.querySelector(".goog-te-banner-frame");
            if (banner) {
                banner.style.display = "none";
            }

            document.body.style.top = "0px";
        }, 500);
        
    </script>
    
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
